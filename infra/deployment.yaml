# The controller = the Ray driver + the demo's data-plane API. The Hub polls
# this Deployment (name must equal feature.yaml `deployment_name`) for readiness.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ray-controller-deployment
  namespace: ${NAMESPACE}
  labels:
    app: ray-controller
spec:
  replicas: 1
  # First rollout pulls the multi-GB Ray image; give it room before failing.
  progressDeadlineSeconds: 900
  selector:
    matchLabels:
      app: ray-controller
  template:
    metadata:
      labels:
        app: ray-controller
    spec:
      serviceAccountName: ray-controller
      containers:
        - name: controller
          image: ${RAY_IMAGE}
          # Stable per-cluster tag is reused across builds; Always makes a rebuild
          # actually get pulled instead of using the node's cached image.
          imagePullPolicy: Always
          command: ["uvicorn", "controller:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          env:
            # Bare service name resolves within this namespace (namespace-portable).
            - name: RAY_ADDRESS
              value: "ray://ray-render-farm-head-svc:10001"
            - name: RAY_CLUSTER_NAME
              value: "ray-render-farm"
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          # Importing Ray at startup is slow (~15-40s). The startupProbe gates the
          # liveness/readiness probes until uvicorn is actually serving, so a slow
          # import can't trigger a restart loop. Allows up to 5 min (60 * 5s).
          startupProbe:
            httpGet: { path: /healthz, port: 8000 }
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet: { path: /healthz, port: 8000 }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            periodSeconds: 15
          resources:
            # 1+ CPU keeps the Ray import (and renders) from being throttled.
            requests: { cpu: "500m", memory: 512Mi }
            limits: { cpu: "2", memory: 2Gi }
