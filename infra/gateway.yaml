# Decentralized gateway — the feature ships its own. metadata.name MUST match
# feature.yaml `gateway.name`.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ray-render-gw
  namespace: ${NAMESPACE}
spec:
  # Modern global external ALB: a DEDICATED load balancer per Gateway. (The
  # classic gke-l7-gxlb shares one "external-http-gateway" LB per cluster, which
  # collides with other features' routes on a shared cluster.) The Ray dashboard
  # is exposed via its own LoadBalancer Service (dashboard-service.yaml).
  gatewayClassName: gke-l7-global-external-managed
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
