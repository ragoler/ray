# Decentralized gateway — the feature ships its own. metadata.name MUST match
# feature.yaml `gateway.name`.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ray-gateway
  namespace: ${NAMESPACE}
spec:
  # Classic global external ALB. It does NOT support HTTPRoute rule filters, so
  # the route is filter-free (the Ray dashboard is exposed via its own
  # LoadBalancer Service instead — see dashboard-service.yaml).
  gatewayClassName: gke-l7-gxlb
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
