# Decentralized gateway — the feature ships its own. metadata.name MUST match
# feature.yaml `gateway.name`.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ray-gateway
  namespace: ${NAMESPACE}
spec:
  # Global external ALB (GFEv3). Required because our HTTPRoute uses a URLRewrite
  # filter for the /ray-dashboard route — the classic gke-l7-gxlb class rejects
  # rule filters (GWCER104).
  gatewayClassName: gke-l7-global-external-managed
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
