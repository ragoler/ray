# Routes the feature Gateway to the controller (data plane: render, SSE, workers).
# Filter-free: the classic gke-l7-gxlb class does not support HTTPRoute rule
# filters, so the Ray dashboard is NOT routed here — it has its own LoadBalancer
# Service (dashboard-service.yaml). All refs are namespace-relative so the Hub's
# namespace rewrite stays consistent.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ray-route
  namespace: ${NAMESPACE}
spec:
  parentRefs:
    - name: ray-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ray-controller
          port: 80
